<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Tyler Nguyen — computer science portfolio and selected work."
    >
    <title>Tyler Nguyen | Portfolio</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="IntroVideo.css">
  </head>
  <body class="intro-active">
    <!-- Full-screen video and sound intro. -->
    <section id="intro-video" class="intro-video" aria-label="Portfolio introduction">
      <video
        class="intro-video__media"
        autoplay
        muted
        playsinline
        preload="auto"
        aria-hidden="true"
      >
        <source src="/videos/portfolio-intro.mp4" type="video/mp4">
      </video>

      <audio class="intro-video__audio" preload="auto" aria-hidden="true">
        <source src="/audio/portfolio-intro.mp3" type="audio/mpeg">
      </audio>

      <button class="intro-video__sound" type="button" hidden>
        Enable sound
      </button>

      <button class="intro-video__enter" type="button" hidden>
        Enter Portfolio
      </button>
    </section>

    <div id="portfolio-content" class="portfolio-content" aria-hidden="true" inert>
      <main id="top">
        <section class="lanyard-scene" aria-labelledby="badge-title">
          <article class="badge-holder">
            <div class="badge-card">
              <div class="id-photo" aria-label="Tyler Nguyen portrait">
                <img src="assets/profile-photo.png" alt="Tyler Nguyen">
              </div>

              <h1 id="badge-title" class="badge-name">Tyler<br>Nguyen</h1>

              <!-- Replace the placeholder URLs below with your own. -->
              <nav class="badge-links" aria-label="Portfolio links">
                <a href="#about">about</a>
                <a href="https://github.com/" target="_blank" rel="noreferrer">projects</a>
                <a href="https://github.com/tylernsocial" target="_blank" rel="noreferrer">github</a>
                <a href="https://www.linkedin.com/in/tyler-nguyen47/" target="_blank" rel="noreferrer">linkedin</a>
                <a href="#">resume</a>
              </nav>

              <div class="badge-footer">
                <span class="badge-brand" aria-hidden="true">TN</span>
                <a class="badge-email" href="mailto:tylernsocial@gmail.com">tylernsocial@gmail.com</a>
              </div>
            </div>
          </article>
        </section>
      </main>

    </div>

    <script src="IntroVideo.js"></script>
    <script src="script.js"></script>
    <noscript>
      <style>
        .intro-video { display: none; }
        .portfolio-content { opacity: 1; }
        body.intro-active { height: auto; overflow: auto; }
      </style>
    </noscript>
  </body>
</html>
