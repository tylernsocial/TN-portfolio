<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Tyler Nguyen — computer science portfolio and selected work."
    >
    <title>Tyler Nguyen | Portfolio</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="IntroVideo.css">
  </head>
  <body class="intro-active">
    <!-- Full-screen video and sound intro. -->
    <section id="intro-video" class="intro-video" aria-label="Portfolio introduction">
      <video
        class="intro-video__media"
        autoplay
        muted
        playsinline
        preload="auto"
        aria-hidden="true"
      >
        <source src="/videos/portfolio-intro.mp4" type="video/mp4">
      </video>

      <audio class="intro-video__audio" preload="auto" aria-hidden="true">
        <source src="/audio/portfolio-intro.mp3" type="audio/mpeg">
      </audio>

      <button class="intro-video__sound" type="button" hidden>
        Enable sound
      </button>

      <button class="intro-video__enter" type="button" hidden>
        Enter Portfolio
      </button>
    </section>

    <div id="portfolio-content" class="portfolio-content" aria-hidden="true" inert>
      <header class="site-header">
        <a class="wordmark" href="#top" aria-label="Tyler Nguyen, home">TN<span>.</span></a>
      </header>

      <main id="top">
        <section class="hero" aria-labelledby="page-title">
          <div class="hero-panel">
            <p class="eyebrow">Computer Science Portfolio / 2026</p>
            <h1 id="page-title">Tyler Nguyen<span>.</span></h1>

            <!-- Replace the placeholder URLs below with your own. -->
            <nav class="link-list" aria-label="Portfolio links">
              <a href="https://github.com/" target="_blank" rel="noreferrer"><span>Projects</span><b aria-hidden="true">-&gt;</b></a>
              <a href="https://github.com/tylernsocial" target="_blank" rel="noreferrer"><span>GitHub</span><b aria-hidden="true">-&gt;</b></a>
              <a href="https://www.linkedin.com/in/tyler-nguyen47/" target="_blank" rel="noreferrer"><span>LinkedIn</span><b aria-hidden="true">-&gt;</b></a>
              <a href="#"><span>Resume</span><b aria-hidden="true">-&gt;</b></a>
            </nav>
          </div>

          <div class="showcase" aria-label="Portfolio preview">
            <video
              class="showcase-video"
              autoplay
              muted
              loop
              playsinline
              preload="auto"
            >
              <source src="/videos/showcase.mov">
            </video>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <span>© <span id="year"></span> Tyler Nguyen</span>
      </footer>
    </div>

    <script src="IntroVideo.js"></script>
    <script src="script.js"></script>
    <noscript>
      <style>
        .intro-video { display: none; }
        .portfolio-content { opacity: 1; }
        body.intro-active { height: auto; overflow: auto; }
      </style>
    </noscript>
  </body>
</html>
